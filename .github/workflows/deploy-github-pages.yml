name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        env:
          ORIZ_FLEET_GOOGLE_ANALYTICS_MEASUREMENT_ID: ${{ secrets.ORIZ_FLEET_GOOGLE_ANALYTICS_MEASUREMENT_ID }}
          ORIZ_FLEET_MICROSOFT_CLARITY_PROJECT_ID: ${{ secrets.ORIZ_FLEET_MICROSOFT_CLARITY_PROJECT_ID }}
          ORIZ_FLEET_POSTHOG_PROJECT_API_KEY: ${{ secrets.ORIZ_FLEET_POSTHOG_PROJECT_API_KEY }}
          ORIZ_FLEET_POSTHOG_API_HOST: ${{ secrets.ORIZ_FLEET_POSTHOG_API_HOST }}
          ORIZ_FLEET_SENTRY_DSN_BROWSER_SDK: ${{ secrets.ORIZ_FLEET_SENTRY_DSN_BROWSER_SDK }}
          ORIZ_FLEET_CLOUDFLARE_WEB_ANALYTICS_TOKEN: ${{ secrets.ORIZ_FLEET_CLOUDFLARE_WEB_ANALYTICS_TOKEN }}
        run: npm run build

      - name: Write CNAME
        run: echo "rto.oriz.in" > dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
